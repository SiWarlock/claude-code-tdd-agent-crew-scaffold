# ╔══════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ ⚠ EXPERIMENTAL — Codex multi-agent team overlay (WIP). config.toml for host=codex + mode=team.   ║
# ║                                                                                                  ║
# ║ Built on Codex's UNSTABLE collaboration_mode / spawn_agent v2 APIs (expect churn; pin a          ║
# ║ known-good Codex version). No native git-worktree isolation; `codex exec` exits 0 even on        ║
# ║ failure (verify via git log + test re-run, never the exit code); --output-schema only on the     ║
# ║ gpt-5 family (coding roles report via a filesystem ledger). This overlay is OFF by default and    ║
# ║ activates only when Codex's collaboration_mode / effort=ultra is enabled; with it off you get     ║
# ║ the solo core (run /tdd directly). Full design + caveats: docs/codex/team-overlay.md.            ║
# ║                                                                                                  ║
# ║ This file is generated INSTEAD of the solo config.codex.toml when you opt into the experimental   ║
# ║ team overlay. Single-track v1: multi-track (per-track worktree teams) is deferred.               ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════╝

# ---- MCP servers (optional; same servers the scaffolding prefers; grep/Read fallback if absent) ----
[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
# [mcp_servers.context7.http_headers]
# CONTEXT7_API_KEY = "..."

# ---- PreToolUse guard hooks (same as the solo core) --------------------------------------------------
# See docs/codex/team-overlay.md §3: territory enforcement is primarily the per-role sandbox writable-roots
# (a capability, stronger than a check); these PreToolUse guards still enforce the `git add -A` ban + secrets.
[[hooks.PreToolUse]]
matcher = "Bash"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "\"$CODEX_PROJECT_DIR\"/scripts/guards/git-guard.sh"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "\"$CODEX_PROJECT_DIR\"/scripts/guards/secrets-guard.sh"

# ---- Subagent lifecycle hooks (replace the Claude TeammateIdle/TaskCompleted team-event-log) ---------
[[hooks.SubagentStart]]
[[hooks.SubagentStart.hooks]]
type = "command"
command = "\"$CODEX_PROJECT_DIR\"/.codex/hooks/subagent-start.sh"

[[hooks.SubagentStop]]
[[hooks.SubagentStop.hooks]]
type = "command"
command = "\"$CODEX_PROJECT_DIR\"/.codex/hooks/subagent-stop.sh"

# ---- Multi-agent limits (docs/codex/team-overlay.md §2) ---------------------------------------------
[agents]
# Topology: root=lead(0) → orchestrator(1) → implementer-per-slice(2) → Step-8 reviewers(3).
max_threads = 5                 # orchestrator(1) + 1 implementer + 2 Step-8 reviewers + headroom. TUNE per machine.
max_depth   = 3                 # MUST be >= 3 — the Step-8 reviewer fan-out lives at depth 3.
job_max_runtime_seconds = 1800  # the only built-in runtime bound (no codex-exec timeout); also the coarse orchestrator-cycle trigger.
interrupt_message = "Finish the current /tdd cycle through the Step-10 commit, then stop. Never abandon a slice mid-flight."

# ---- Roles (config_file layers a model + sandbox onto each role; bodies in .codex/agents/<role>.toml) -
[agents.orchestrator]
description = "Plans/scopes, authors briefs, runs Step-2.5 review + Step-9 routing, owns the task ledger + push."
config_file = ".codex/agents/orchestrator.toml"
nickname_candidates = ["orchestrator", "orch"]
# model = "gpt-5..."          # a gpt-5-FAMILY model so agent_result can use --output-schema (HUMAN DECISION).

[agents.implementer]
description = "Runs /tdd in one code area; returns the Step-2.5 write-up + Step-9 flags; commits at Step-10."
config_file = ".codex/agents/implementer.toml"
nickname_candidates = ["implementer", "impl"]
# model = "gpt-5-codex"       # coding quality; NO --output-schema there → reports via the filesystem ledger.

[agents.reviewer-quality]
description = "Slice code-quality review at the /tdd Step-7 → Step-8 boundary (read-only)."
config_file = ".codex/agents/reviewer-quality.toml"
nickname_candidates = ["reviewer-quality", "quality"]

[agents.reviewer-security]
description = "Slice security review at the /tdd Step-7 → Step-8 boundary (read-only)."
config_file = ".codex/agents/reviewer-security.toml"
nickname_candidates = ["reviewer-security", "security"]

[agents.reachability-auditor]
description = "Area-wide reachability audit at the phase-exit gate (read-only)."
config_file = ".codex/agents/reachability-auditor.toml"
nickname_candidates = ["reachability-auditor", "reach"]

[agents.arch-drift-auditor]
description = "Spec-vs-code drift audit at the phase-exit gate (read-only)."
config_file = ".codex/agents/arch-drift-auditor.toml"
nickname_candidates = ["arch-drift-auditor", "drift"]
