# config.toml — Codex CLI project config (generated by scaffold-generate when host=codex).
#
# TEMPLATE NOTE (delete this whole comment block when generating): this is the Codex-host
# analog of the Claude `.claude/settings.json`. It registers the project's MCP servers and
# the PreToolUse guard hooks. Only the SOLO-core guards are wired here (git-guard +
# secrets-guard); territory-guard and the TeammateIdle/TaskCompleted team-event hooks are
# part of the EXPERIMENTAL Codex team overlay (see docs/codex/team-overlay.md) and are not
# emitted in the solo core.
#
# MCP servers are OPTIONAL. If codegraph / context7 aren't installed, Codex ignores these
# blocks and the harness falls back to grep + Read — nothing breaks. Keep this posture.
#
# HOST DETAIL (confirmed against real Codex source + docs): Codex sets NO env var analogous to Claude's
# CLAUDE_PROJECT_DIR, under any build — there is no CODEX_PROJECT_DIR. Codex instead passes the session's
# cwd via the hook payload's own `cwd` JSON field, and hook `command` strings run with that same cwd as
# their working directory. Since Codex may be started from a subdirectory, this config resolves the repo
# root for both (a) locating the guard scripts below and (b) each script's own internal project-root need
# via `$(git rev-parse --show-toplevel)` — Codex's own documented recommendation for repo-local hook path
# stability — rather than a nonexistent project-dir env var. The `.tool_input.command` PreToolUse payload
# shape below is confirmed correct against codex-rs source (`hook_runtime.rs`) and the official hooks docs.
# Codex also accepts a Claude-format hooks.json with the identical shape if you prefer that file layout.

# ---- MCP servers (optional; same servers the Claude scaffolding prefers) --------------------
[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
# Provide the key via the environment, or uncomment an http_headers block:
# [mcp_servers.context7.http_headers]
# CONTEXT7_API_KEY = "..."

# ---- PreToolUse guard hooks (mirror the Claude settings.json PreToolUse[Bash] guards) -------
[[hooks.PreToolUse]]
matcher = "Bash"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "\"$(git rev-parse --show-toplevel)\"/scripts/guards/git-guard.sh"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "\"$(git rev-parse --show-toplevel)\"/scripts/guards/secrets-guard.sh"
