name = "reachability-auditor"

description = """
Depth-2 child spawned directly by the orchestrator (depth-1) at the **phase-exit gate** (not per-slice), in
parallel with `arch-drift-auditor` (and a phase-boundary `reviewer-security`). Automates `/wired` across a whole code area:
