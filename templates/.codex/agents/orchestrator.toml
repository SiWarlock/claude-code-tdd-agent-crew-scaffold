name = "orchestrator"

description = """
Depth-1 child of the root session (the lead). Plans + scopes the build, authors /tdd briefs, runs the
Step-2.5 test review and the Step-9 hot-routing, owns the `.codex-team/<label>/tasks.jsonl` ledger and the
push, walks the IMPLEMENTATION_PLAN.md `Depends on:` DAG to gate per-slice implementer spawns, runs the
3-failure circuit breaker, and escalates the 4 categories to the root → human. Spawned once by the root via
`spawn_agent(role=orchestrator)` and kept alive across the build with `followup_task`. Port of the Claude
orchestrator charter (docs/orchestrator-briefing.md) onto Codex's fork-join spawn tree.
