# config.toml — Codex CLI project config (generated by scaffold-generate when host=codex).
#
# TEMPLATE NOTE (delete this whole comment block when generating): this is the Codex-host
# analog of the Claude `.claude/settings.json`. It registers the project's MCP servers and
# the PreToolUse guard hooks. Only the SOLO-core guards are wired here (git-guard +
# secrets-guard); territory-guard and the TeammateIdle/TaskCompleted team-event hooks are
# part of the EXPERIMENTAL Codex team overlay (see docs/codex/team-overlay.md) and are not
# emitted in the solo core.
#
# MCP servers are OPTIONAL. If codegraph / context7 aren't installed, Codex ignores these
# blocks and the harness falls back to grep + Read — nothing breaks. Keep this posture.
#
# ⚠ HOST DETAIL TO CONFIRM PER CODEX VERSION (open decision D3): the guard hooks reference
# "$CODEX_PROJECT_DIR" as the repo root and parse a PreToolUse payload shape compatible with
# `.tool_input.command`. Codex's PreToolUse hooks honor the Claude-format payload + a
# config.toml [hooks] section (confirmed against codex-rs HookEventsToml), but the exact
# project-dir env var name can differ by build. The guards FAIL SAFE (exit 0 when the field
# is empty), so a mismatch silently disables enforcement rather than breaking the harness —
# but confirm the env var on your Codex version to keep enforcement live. Codex also accepts a
# Claude-format hooks.json with the identical shape if you prefer that file layout.

# ---- MCP servers (optional; same servers the Claude scaffolding prefers) --------------------
[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
# Provide the key via the environment, or uncomment an http_headers block:
# [mcp_servers.context7.http_headers]
# CONTEXT7_API_KEY = "..."

# ---- PreToolUse guard hooks (mirror the Claude settings.json PreToolUse[Bash] guards) -------
[[hooks.PreToolUse]]
matcher = "Bash"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "\"$CODEX_PROJECT_DIR\"/scripts/guards/git-guard.sh"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "\"$CODEX_PROJECT_DIR\"/scripts/guards/secrets-guard.sh"
